<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tubarão-Mako</title>

  <!-- Fonte moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      font-family: 'Inter', sans-serif;
      color: #222;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background-color: #ffffff;
      max-width: 900px;
      width: 100%;
      padding: 50px 40px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      margin-bottom: 30px;
      color: #0f2027;
    }

    .imagem-animal {
      width: 280px;
      height: 340px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 35px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .texto {
      font-size: 20px;
      line-height: 1.7;
      max-width: 750px;
      margin: 0 auto;
      text-align: justify;
    }

    .texto::first-letter {
      font-size: 40px;
      font-weight: bold;
      float: left;
      margin-right: 8px;
      line-height: 1;
      color: #2c5364;
    }

    .rodape {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
      font-size: 16px;
      color: #555;
    }

    .rodape a {
      text-decoration: none;
      font-weight: 500;
      color: #2c5364;
      transition: 0.3s;
    }

    .rodape a:hover {
      color: #0f2027;
      text-decoration: underline;
    }

    .assinatura {
      margin-top: 10px;
      font-style: italic;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
      }

      .texto {
        font-size: 18px;
      }

      .imagem-animal {
        width: 100%;
        height: auto;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Tubarão-Mako</h1>

    <img
      class="imagem-animal"
      src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/1500523356064.webp?w=900&h=676&q=100"
      alt="Tubarão-Mako"
    />

    <p class="texto">
      O tubarão-mako é basicamente o “foguete com dentes” do oceano.
      O mais famoso é o Tubarão-mako-de-barbatana-curta, conhecido por ser um dos tubarões mais rápidos do mundo. 
      Ele nada tão rápido que parece que está atrasado pra uma reunião no fundo do mar.
      <br><br>
      Tem corpo aerodinâmico, olhar meio psicopata (mas elegante), e dentes que ficam pra fora mesmo com a boca fechada — 
      tipo alguém que está sempre pronto pra dizer “oi”... ou morder alguma coisa.
      <br><br>
      Ele pula pra fora da água igual golfinho empolgado, só que com energia de atleta olímpico e zero interesse em fazer amizade.
      <br><br>
      Resumindo: se o oceano tivesse Fórmula 1, o mako já teria vários campeonatos — e provavelmente mastigado o troféu.
      <br><br>
      Eu diria que é um excelente candidato a animal de estimação — desde que sua casa seja o oceano aberto e você não se importe em perder alguns móveis... e talvez um braço.
    </p>

    <div class="rodape">
      <p>
        <a href="https://pt.wikipedia.org/wiki/Isurus_oxyrinchus" target="_blank">
          Saiba mais na Wikipedia
        </a>
      </p>
      <p class="assinatura">
        Feito por Eduardo Schulze da Cunha • 03 de março de 2026
      </p>
    </div>
  </div>
</body>
</html># Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
